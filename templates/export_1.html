<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Export Data</title>

<link rel="icon" type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<script>
if (localStorage.getItem("darkMode") === "true") {
    document.documentElement.classList.add("dark-mode");
}
</script>

<style>

/* ================= DARK MODE TOGGLE BASE ================= */
.dark-mode {
  background-color: #121212 !important;
  color: #e0e0e0 !important;
}

/* NAVBAR */
.dark-mode .navbar {
  background-color: #1a1a1a !important;
}

.dark-mode .navbar-brand {
  color: #ffffff !important;
}

/* CONTAINER + CARD */
.dark-mode .container,
.dark-mode .card {
  background-color: #1e1e1e !important;
  color: #e0e0e0 !important;
}

/* TEXT */
.dark-mode h1,
.dark-mode h2,
.dark-mode h3,
.dark-mode h4,
.dark-mode h5,
.dark-mode h6,
.dark-mode p,
.dark-mode span,
.dark-mode small,
.dark-mode label {
  color: #e0e0e0 !important;
}

/* TABLE BASE */
.dark-mode table {
  background-color: #1e1e1e !important;
  color: #ffffff !important;
  border-color: #333 !important;
}

/* TABLE HEAD */
.dark-mode thead th {
  background-color: #2a2a2a !important;
  color: #ffffff !important;
}

/* TABLE BODY */
.dark-mode tbody td,
.dark-mode tbody th {
  background-color: #1e1e1e !important;
  color: #ffffff !important;
  border-color: #333 !important;
}

/* BUTTONS */
.dark-mode .btn-light {
  background-color: #333 !important;
  color: #fff !important;
  border: 1px solid #555 !important;
}

.dark-mode .btn-warning {
  background-color: #6b4f00 !important;
  color: #fff !important;
}

.dark-mode .btn-success {
  background-color: #1f6f3b !important;
}

/* INPUT VIEW MODE FIX */
.dark-mode .form-control {
  background-color: #2a2a2a !important;
  color: #fff !important;
  border: 1px solid #444 !important;
}

/* BACKGROUND */
.dark-mode .bg-light {
  background-color: #121212 !important;
}

.dark-mode .bg-primary {
  background-color: #1f1f1f !important;
}

/* Darker modal overlay */
.dark-mode .modal {
  background: rgba(0,0,0,0.75) !important;
}

/* MODAL DARK MODE */
.dark-mode .modal-content {
  background-color: #1e1e1e !important;
  color: #e0e0e0 !important;
  border: 1px solid #333 !important;
}

.dark-mode .modal-header {
  border-bottom: 1px solid #333 !important;
}

.dark-mode .modal-footer {
  border-top: 1px solid #333 !important;
}

.dark-mode .modal-title,
.dark-mode .modal-body {
  color: #ffffff !important;
}

</style>


</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary shadow">
  <div class="container-fluid">

    <span class="navbar-brand fw-bold">
      <i class="bi bi-download"></i> Export Center
    </span>

    <a href="{{ url_for('dashboard_admin') if session['role']=='Admin' else url_for('dashboard_instructor') }}"
       class="btn btn-light btn-sm">

       <i class="bi bi-arrow-left"></i> Back

    </a>

  </div>
</nav>

<!-- MAIN -->
<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-7">

      <div class="card shadow p-4">

        <h4 class="text-center mb-2">
          📤 Export Student Data
        </h4>

        <p class="text-muted text-center">
          Filter data before downloading CSV
        </p>

        <!-- FORM -->
        <form method="GET" action="{{ url_for('export_csv') }}">

          <!-- YEAR -->
          <div class="mb-3">
            <label class="form-label">Year</label>

            <select name="year" class="form-select">
              <option value="">All Years</option>
              <option value="1st">1st</option>
              <option value="2nd">2nd</option>
              <option value="3rd">3rd</option>
              <option value="4th">4th</option>
            </select>
          </div>

          <!-- SECTION -->
          <div class="mb-3">
            <label class="form-label">Section</label>

            <select name="section" class="form-select">
              <option value="">All Sections</option>

              <option value="2A">2A</option>
              <option value="2B">2B</option>

              <option value="3A">3A</option>
              <option value="3B">3B</option>

              <option value="4A">4A</option>
              <option value="4B">4B</option>
            </select>
          </div>

          <!-- SUBJECT -->
          <div class="mb-3">
            <label class="form-label">Subject</label>

            <input type="text"
                   name="subject"
                   class="form-control"
                   placeholder="e.g. Math, Science">
          </div>

          <!-- SEMESTER -->
          <div class="mb-3">
            <label class="form-label">Semester</label>

            <select name="semester" class="form-select">
              <option value="">All Semesters</option>

              <option value="1st">1st</option>
              <option value="2nd">2nd</option>
              <option value="Summer">Summer</option>
            </select>
          </div>

          <!-- SCHOOL YEAR -->
          <div class="mb-3">
            <label class="form-label">School Year</label>

            <select name="school_year" class="form-select">

              <option value="">All School Years</option>

              <option value="2023-2024">2023-2024</option>
              <option value="2024-2025">2024-2025</option>
              <option value="2025-2026">2025-2026</option>
              <option value="2026-2027">2026-2027</option>
              <option value="2027-2028">2027-2028</option>
              <option value="2028-2029">2028-2029</option>

            </select>
          </div>

          <!-- TERM -->
          <div class="mb-3">

            <label class="form-label">Term</label>

            <select name="term" class="form-select">

              <option value="">All Terms</option>

              <option value="midterm">Midterm</option>
              <option value="final">Final</option>

            </select>

          </div>

          <!-- ACTIVITY TYPE -->
          <div class="mb-3">

            <label class="form-label">Activity Type</label>

            <select name="activity_type" class="form-select">

              <option value="">All Activities</option>

              <option value="attendance">Attendance</option>
              <option value="quiz">Quizzes</option>
              <option value="exam">Exams</option>
              <option value="pit">PIT</option>
              <option value="exercise">Exercises</option>
              <option value="laboratory">Laboratory</option>
              <option value="report">Reports</option>
              <option value="grades">Grades</option>

            </select>

          </div>

          <!-- BUTTONS -->
          <button type="submit"
                  name="preview"
                  value="1"
                  class="btn btn-secondary w-100 mb-2">

            👁 Preview Data

          </button>

          <button type="submit"
                  class="btn btn-primary w-100">

            <i class="bi bi-download"></i>
            Download CSV

          </button>

        </form>

      </div>

    </div>

  </div>

</div>

</body>
</html>
