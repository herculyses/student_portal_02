<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Exams</title>

<link rel="icon" type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script>
if (localStorage.getItem("darkMode") === "true") {
    document.documentElement.classList.add("dark-mode");
}
</script>

<style>

/* ================= DARK MODE TOGGLE BASE ================= */
.dark-mode {
  background-color: #121212 !important;
  color: #e0e0e0 !important;
}

/* NAVBAR */
.dark-mode .navbar {
  background-color: #1a1a1a !important;
}

.dark-mode .navbar-brand {
  color: #ffffff !important;
}

/* CONTAINER + CARD */
.dark-mode .container,
.dark-mode .card {
  background-color: #1e1e1e !important;
  color: #e0e0e0 !important;
}

/* TEXT */
.dark-mode h1,
.dark-mode h2,
.dark-mode h3,
.dark-mode h4,
.dark-mode h5,
.dark-mode h6,
.dark-mode p,
.dark-mode span,
.dark-mode small,
.dark-mode label {
  color: #e0e0e0 !important;
}

/* TABLE BASE */
.dark-mode table {
  background-color: #1e1e1e !important;
  color: #ffffff !important;
  border-color: #333 !important;
}

/* TABLE HEAD */
.dark-mode thead th {
  background-color: #2a2a2a !important;
  color: #ffffff !important;
}

/* TABLE BODY */
.dark-mode tbody td,
.dark-mode tbody th {
  background-color: #1e1e1e !important;
  color: #ffffff !important;
  border-color: #333 !important;
}

/* BUTTONS */
.dark-mode .btn-light {
  background-color: #333 !important;
  color: #fff !important;
  border: 1px solid #555 !important;
}

.dark-mode .btn-warning {
  background-color: #6b4f00 !important;
  color: #fff !important;
}

.dark-mode .btn-success {
  background-color: #1f6f3b !important;
}

/* INPUT VIEW MODE FIX */
.dark-mode .form-control {
  background-color: #2a2a2a !important;
  color: #fff !important;
  border: 1px solid #444 !important;
}

/* BACKGROUND */
.dark-mode .bg-light {
  background-color: #121212 !important;
}

.dark-mode .bg-primary {
  background-color: #1f1f1f !important;
}

/* Darker modal overlay */
.dark-mode .modal {
  background: rgba(0,0,0,0.75) !important;
}

/* MODAL DARK MODE */
.dark-mode .modal-content {
  background-color: #1e1e1e !important;
  color: #e0e0e0 !important;
  border: 1px solid #333 !important;
}

.dark-mode .modal-header {
  border-bottom: 1px solid #333 !important;
}

.dark-mode .modal-footer {
  border-top: 1px solid #333 !important;
}

.dark-mode .modal-title,
.dark-mode .modal-body {
  color: #ffffff !important;
}

</style>

</head>

<body class="bg-light">

<div class="container py-4">

    <h3 class="mb-4">Available Exams</h3>

{% if exams %}
    {% for exam in exams %}
        <div class="card mb-3 shadow-sm">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">{{ exam.title }}</h5>
                    <span class="badge bg-success">Active</span>
                </div>

                <p class="text-muted mb-1">
                    {{ exam.subject.subject_name if exam.subject else "No Subject" }}
                </p>

                <p>Duration: {{ exam.duration_minutes }} minutes</p>

                <a href="{{ url_for('start_exam', exam_id=exam.id) }}"
                   class="btn btn-primary">
                    Start Exam
                </a>

            </div>
        </div>
    {% endfor %}
{% else %}
    <div class="alert alert-info">
        No exams available right now.
    </div>
{% endif %}

</div>

</body>
</html>
