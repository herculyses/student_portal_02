<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons - updated to 1.11.3 to support all icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <title>{% block title %}Student Portal{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <meta name="theme-color" content="#0d6efd">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- GLOBAL IMPROVED STYLES - Sync all exam pages -->
    <style>
        /* === DARK MODE GLOBAL === */
        .dark-mode { background-color: #121212 !important; color: #e0e0e0 !important; }
        .dark-mode .card { background-color: #1e1e1e !important; color: white !important; }
        .dark-mode .table { color: white !important; }
        .dark-mode .table-light { background-color: #2a2a2a !important; }
        .dark-mode .text-muted { color: #cfcfcf !important; }
        .dark-mode .bg-light { background-color: #121212 !important; }

        /* === EXAM CARD SEAMLESS ANIMATION - Global for all pages === */
        .exam-card { 
            transition: all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) !important; 
            will-change: transform, opacity, max-height; 
        }
        .exam-card.exiting { 
            transform: translateX(180px) scale(0.75) rotate(3deg) !important; 
            opacity:0 !important; 
            max-height:0 !important; 
            margin:0 !important; 
            padding:0 !important; 
            overflow:hidden !important; 
            border:0 !important; 
            filter: blur(4px); 
        }
        .exam-card.entering { 
            animation: seamlessEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        @keyframes seamlessEnter { 
            0% { transform: translateY(50px) scale(0.8); opacity:0; } 
            60% { transform: translateY(-10px) scale(1.03); } 
            100% { transform: translateY(0) scale(1); opacity:1; } 
        }

        /* === SECURITY LOGS FIX - Fixes white background + grey text bug === */
        body.security-logs-page { background: #0f172a !important; color: #f1f5f9 !important; }
        body.security-logs-page .card { background: #1e293b !important; border: 1px solid #475569 !important; color: #f1f5f9 !important; }
        body.security-logs-page .table-dark { --bs-table-bg: #1e293b !important; --bs-table-color: #f1f5f9 !important; }
        body.security-logs-page .table-dark th { color: #f8fafc !important; font-weight: 700; background: #0f172a !important; }
        body.security-logs-page .security-table tbody td { color: #e2e8f0 !important; background: #1e293b !important; vertical-align: middle; }
        body.security-logs-page .security-table tbody tr { border-bottom: 1px solid #334155 !important; background: #1e293b !important; }
        body.security-logs-page .security-table tbody tr:hover { background: #2d3a4f !important; }
        body.security-logs-page .security-table tbody tr td { background: inherit !important; }
        /* Force student name readable */
        body.security-logs-page .security-table strong { color: #f8fafc !important; }
        body.security-logs-page .security-table small { color: #cbd5e1 !important; }
        body.security-logs-page .small-muted { color: #cbd5e1 !important; }
        body.security-logs-page .text-muted-readable { color: #94a3b8 !important; }
        body.security-logs-page .text-muted { color: #94a3b8 !important; }
        body.security-logs-page .bg-light { background: #0f172a !important; }

        /* === SECURITY LOGS SPECIFIC CARDS === */
        .exam-security-card { border-left: 4px solid #ef4444; margin-bottom: 1.5rem; }
        .live-dot { width:10px; height:10px; background:#22c55e; border-radius:50%; display:inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .count-badge { min-width: 32px; display: inline-block; text-align: center; font-weight: 800; font-size: 0.85rem; padding: 0.35em 0.5em; }
        .count-zero { background: #334155 !important; color: #64748b !important; }
        .violation-col { min-width: 55px; text-align: center; }
        .badge-critical { background: #dc2626; color: white; border: 1px solid #fca5a5; }
        .stat-card { border-left: 4px solid; background: #1e293b !important; }
        .stat-card h5 { color: #f8fafc !important; font-weight: 800; font-size: 1.8rem; }
        .stat-danger { border-left-color: #ef4444; }
        .stat-warning { border-left-color: #f59e0b; }
        .glow-cheating { animation: glowPulse 2s ease-in-out 3; box-shadow: 0 0 15px rgba(239,68,68,0.6) !important; background: #2a1f2f !important; }
        .glow-score { animation: scoreGlow 2s ease-in-out 3; background: #ef4444 !important; color: white !important; box-shadow: 0 0 20px rgba(239,68,68,0.8); transform: scale(1.15); }
        .glow-count { animation: countGlow 1.5s ease-in-out 3; box-shadow: 0 0 15px rgba(251,191,36,0.9) !important; transform: scale(1.3); background: #f59e0b !important; color: black !important; }
        @keyframes glowPulse { 0%,100% { box-shadow: 0 0 5px rgba(239,68,68,0.3); } 50% { box-shadow: 0 0 25px rgba(239,68,68,0.9); } }
        @keyframes scoreGlow { 0%,100% { box-shadow: 0 0 5px rgba(239,68,68,0.5); transform: scale(1); } 50% { box-shadow: 0 0 30px rgba(239,68,68,1); transform: scale(1.25); } }
        @keyframes countGlow { 0%,100% { box-shadow: 0 0 5px rgba(251,191,36,0.4); transform: scale(1); } 50% { box-shadow: 0 0 25px rgba(251,191,36,1); transform: scale(1.35); } }

        /* === ARCHIVED PAGES === */
        .exam-card-archived { border-left: 5px solid #64748b; }
        .text-readable { color: #e2e8f0 !important; }
        .text-small-muted { color: #cbd5e1 !important; }

        /* === Delete zone === */
        .delete-zone { border-top: 1px solid #dc3545; margin-top: 15px; padding-top: 10px; display: flex; justify-content: flex-end; }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="{% if request.endpoint in ['security_logs', 'archived_security_logs'] %}security-logs-page{% endif %}">
{% block content %}{% endblock %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<!-- GLOBAL SYNC SYSTEM - View Exams <-> Finished <-> Archived <-> Security Logs -->
<script>
// Dark mode init
if (localStorage.getItem("darkMode") === "true") {
    document.documentElement.classList.add("dark-mode");
}

// Global BroadcastChannel for exam moves - visible in any state
const examChannel = new BroadcastChannel('exam_moves');

// Listen for moves from other pages/tabs - auto appear/disappear
examChannel.onmessage = async (e) => {
    const data = e.data;
    console.log('[BASE] Received broadcast', data);
    const currentPage = window.location.pathname;
    const existingCard = document.getElementById(`exam-card-${data.exam_id}`);
    
    // If card already exists and action is archive, remove it (two cards must disappear)
    if(existingCard && data.action === 'archive'){
        if(currentPage.includes('view-exams') || currentPage.includes('finished-exams') || currentPage.includes('security-logs')){
            // Only archive action should remove from active pages
            const shouldRemove = (currentPage.includes('view-exams') && data.action === 'end') ||
                                 (currentPage.includes('finished-exams') && data.action === 'archive') ||
                                 (currentPage.includes('security-logs') && data.action === 'archive');
            // For security_logs, archive should remove exam card block
            if(currentPage.includes('security-logs') && data.action === 'archive'){
                existingCard.classList.add('exiting');
                setTimeout(()=>{ existingCard.remove(); if(typeof updateCounts === 'function') updateCounts(); }, 650);
                return;
            }
        }
    }
    if(existingCard) return; // already here

    let shouldAppear = false;
    if(data.action === 'end' && currentPage.includes('finished-exams')) shouldAppear = true;
    if(data.action === 'archive' && currentPage.includes('archived-exams')) shouldAppear = true;
    if(data.action === 'restore' && currentPage.includes('finished-exams')) shouldAppear = true;
    if(data.action === 'start' && currentPage.includes('view-exams')) shouldAppear = true;
    // Security logs auto-appear for new active exams
    if(data.action === 'start' && currentPage.includes('security-logs')) shouldAppear = true;
    if(data.action === 'archive' && currentPage.includes('security-logs-archived')) shouldAppear = true;

    if(!shouldAppear) return;

    try{
        const res = await fetch(`/api/exam/${data.exam_id}/card`);
        if(!res.ok) return;
        const exam = await res.json();
        if(typeof createIncomingCard === 'function'){
            createIncomingCard(exam, data.action);
        } else {
            // Fallback: simple reload hint
            const container = document.querySelector('.container, .container-fluid');
            if(container){
                const toast = document.createElement('div');
                toast.className = 'alert alert-info position-fixed bottom-0 end-0 m-3';
                toast.style.zIndex = '9999';
                toast.innerHTML = `✨ "${exam.title}" moved to ${data.action} - <a href="" onclick="location.reload()">Refresh</a>`;
                document.body.appendChild(toast);
                setTimeout(()=>toast.remove(), 5000);
            }
        }
    }catch(err){ console.error('[BASE] sync error', err); }
};

function broadcastMove(action, exam_id, title){
    examChannel.postMessage({action, exam_id, title, timestamp: Date.now()});
    localStorage.setItem('last_exam_move', JSON.stringify({action, exam_id, title, timestamp: Date.now()}));
}

// Live clock for security logs
setInterval(()=>{
    const clock = document.getElementById('liveClock');
    if(clock) clock.textContent = new Date().toLocaleTimeString();
}, 1000);
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
